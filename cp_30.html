<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CP-30 Architecture Lab</title>
  <style>
    :root{--bg:#0f1216;--panel:#1d1711;--panel2:#2a2219;--text:#efe7d6;--muted:#b9ab93;--line:#514234;--accent:#d9a248;--amber:#f2c56d;--wood1:#7a5230;--wood2:#3b2819;--lamp:#86f28b}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Arial,sans-serif;background:radial-gradient(circle at 20% 0%,rgba(217,162,72,.08),transparent 28%),linear-gradient(180deg,#0c0f13,#15120f);color:var(--text)}
    .wrap{max-width:1380px;margin:0 auto;padding:16px}
    .panel{position:relative;background:linear-gradient(180deg,var(--wood1),var(--wood2) 16%,var(--panel) 16.2%,var(--panel));border:1px solid #6b543f;border-radius:24px;padding:18px;box-shadow:0 18px 44px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.06)}
    .panel:before,.panel:after{content:"";position:absolute;top:10px;bottom:10px;width:14px;border-radius:10px;background:linear-gradient(180deg,#8b6037,#4a311c);box-shadow:inset 0 1px 0 rgba(255,255,255,.08), inset 0 -1px 0 rgba(0,0,0,.4)}
    .panel:before{left:-6px}.panel:after{right:-6px}
    .row{display:grid;gap:14px}.top{grid-template-columns:1fr 420px;align-items:start}.controls{grid-template-columns:repeat(4,minmax(0,1fr))}
    .card{background:linear-gradient(180deg,#31271d,#261f18);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:inset 0 1px 0 rgba(255,255,255,.04);position:relative}
    .card:before{content:"";position:absolute;left:10px;right:10px;top:0;height:1px;background:rgba(255,255,255,.05)}
    .stack{display:grid;gap:10px}
    h1{margin:0;font-size:42px;letter-spacing:.22em}.sub{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:4px}
    .brandRow{display:flex;align-items:center;gap:14px}.lamp{width:12px;height:12px;border-radius:999px;background:#233126;border:1px solid #1f2a21;box-shadow:inset 0 0 6px rgba(0,0,0,.5)}.lamp.on{background:var(--lamp);box-shadow:0 0 14px rgba(134,242,139,.45), inset 0 0 4px rgba(255,255,255,.35)}
    label{display:grid;gap:6px;font-size:13px;color:#e3d9ca}.mini{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}
    select,input[type=range],button{width:100%}
    select,button{background:#17120d;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px 12px}
    button{cursor:pointer}.active{background:linear-gradient(180deg,#7a5a23,#5b4317);border-color:#d1a04b}
    .small{font-size:12px;color:var(--muted)}
    .meter{height:8px;background:#0d1116;border:1px solid var(--line);border-radius:999px;overflow:hidden}.meter>div{height:100%;width:0;background:linear-gradient(90deg,#6fd571,#f0cf68,#d96565)}
    .kbd{position:relative;height:190px;background:#0b0e12;border:1px solid var(--line);border-radius:16px;overflow:hidden;box-shadow:inset 0 10px 20px rgba(255,255,255,.02)}
    .w,.b{position:absolute;bottom:0;border-radius:0 0 8px 8px;display:flex;justify-content:center;align-items:flex-end;font-size:10px;padding-bottom:8px;user-select:none;cursor:pointer}
    .w{background:linear-gradient(180deg,#faf9f7,#d6d2ca);color:#5e594f;border:1px solid #9f9a91;height:100%;z-index:1}.w.on{background:linear-gradient(180deg,#ffd27c,#cb8718);color:#2d1a00}
    .b{background:linear-gradient(180deg,#4a5059,#0b0d11);color:#eef2f7;border:1px solid #05070a;height:60%;z-index:2}.b.on{background:linear-gradient(180deg,#ffcf78,#855509)}
    .sectionLine{height:1px;background:linear-gradient(90deg,transparent,rgba(217,162,72,.35),transparent);margin:6px 0}
    @media(max-width:1100px){.controls{grid-template-columns:1fr 1fr}} @media(max-width:980px){.top,.controls{grid-template-columns:1fr}.kbd{height:160px}.panel:before,.panel:after{display:none}}
  </style>
</head>
<body>
<div class="wrap">
  <div class="panel stack">
    <div class="row top">
      <div>
        <div class="brandRow">
          <div class="lamp on"></div>
          <div>
            <h1>CP-30</h1>
            <div class="sub">electric grand piano</div>
          </div>
        </div>
      </div>
      <div class="card stack">
        <div class="mini">Power & Presets</div>
        <div class="sectionLine"></div>
        <button id="audioBtn">Power / Audio</button>
        <button id="midiBtn">Enable MIDI</button>
        <select id="preset">
          <option value="cpClassic">CP Classic</option>
          <option value="cpBright">CP Bright</option>
          <option value="cpDark">CP Dark</option>
          <option value="harpsiMix">Harpsi Mix</option>
          <option value="chorusedWide">Wide Dual</option>
          <option value="tremShow">Tremolo Show</option>
        </select>
        <div class="small">Status: <span id="status">idle</span></div>
        <div class="small">MIDI: <span id="midiInfo">not enabled</span></div>
      </div>
    </div>

    <div class="row controls">
      <div class="card stack">
        <div class="mini">Shared Output Section</div>
        <div class="sectionLine"></div>
        <label>Volume <input id="volume" type="range" min="0" max="1.2" step="0.01" value="0.82"></label>
        <label>Balance I / II <input id="balance" type="range" min="-1" max="1" step="0.01" value="0"></label>
        <label>Bass <input id="bass" type="range" min="-1" max="1" step="0.01" value="0"></label>
        <label>Treble <input id="treble" type="range" min="-1" max="1" step="0.01" value="0"></label>
        <label>Tremolo Speed <input id="tremSpeed" type="range" min="0.2" max="10" step="0.01" value="4.0"></label>
        <label>Tremolo Depth <input id="tremDepth" type="range" min="0" max="0.6" step="0.01" value="0.22"></label>
      </div>

      <div class="card stack">
        <div class="mini">Channel I / II</div>
        <div class="sectionLine"></div>
        <select id="voice1">
          <option value="piano1">Piano 1</option>
          <option value="piano2">Piano 2</option>
          <option value="piano3">Piano 3</option>
          <option value="harpsi">Harpsichord</option>
        </select>
        <label>Pitch I <input id="pitch1" type="range" min="-0.5" max="0.5" step="0.01" value="-0.02"></label>
        <label>Decay I <input id="decay1" type="range" min="0.2" max="4.5" step="0.01" value="4.5"></label>
        <label>Attack I <input id="attack1" type="range" min="0" max="1" step="0.01" value="0.48"></label>
        <button id="trem1" type="button" class="active">Tremolo I</button>
        <select id="voice2">
          <option value="piano1">Piano 1</option>
          <option value="piano2" selected>Piano 2</option>
          <option value="piano3">Piano 3</option>
          <option value="harpsi">Harpsichord</option>
        </select>
        <label>Pitch II <input id="pitch2" type="range" min="-0.5" max="0.5" step="0.01" value="0.05"></label>
        <label>Decay II <input id="decay2" type="range" min="0.2" max="4.5" step="0.01" value="4.5"></label>
        <label>Attack II <input id="attack2" type="range" min="0" max="1" step="0.01" value="0.52"></label>
        <button id="trem2" type="button" class="active">Tremolo II</button>
      </div>

      <div class="card stack">
        <div class="mini">Effects & Dynamics</div>
        <div class="sectionLine"></div>
        <label>Compressor <input id="comp" type="range" min="0" max="1" step="0.01" value="0.42"></label>
        <label>Overdrive <input id="drive" type="range" min="0" max="1" step="0.01" value="0.08"></label>
        <label>Chorus <input id="chorus" type="range" min="0" max="1" step="0.01" value="0.18"></label>
        <label>Space <input id="space" type="range" min="0" max="1" step="0.01" value="0.10"></label>
        
      </div>

      <div class="card stack">
        <div class="mini">Performance</div>
        <div class="sectionLine"></div>
        <button id="sustain" type="button">Sustain</button>
        <label>Polyphony <input id="poly" type="range" min="8" max="40" step="1" value="24"></label>
        <label>Velocity Curve
          <select id="velCurve">
            <option value="soft">Soft</option>
            <option value="normal" selected>Normal</option>
            <option value="hard">Hard</option>
          </select>
        </label>
        <div class="small">Keys: Z–M and Q–P</div>
        <div class="small">Voices: <span id="voicesReadout">0</span></div>
        <div class="meter"><div id="meterBar"></div></div>
      </div>
    </div>

    <div id="kbd" class="kbd"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const blackSet = new Set([1, 3, 6, 8, 10]);
const noteNames = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
const keyMap = {
  z: 48, s: 49, x: 50, d: 51, c: 52, v: 53, g: 54, b: 55, h: 56, n: 57, j: 58, m: 59,
  ',': 60, l: 61, '.': 62, ';': 63, '/': 64,
  q: 60, '2': 61, w: 62, '3': 63, e: 64, r: 65, '5': 66, t: 67, '6': 68, y: 69, '7': 70, u: 71, i: 72, '9': 73, o: 74, '0': 75, p: 76
};

const state = {
  ctx: null,
  inputBus: null,
  master: null,
  bass: null,
  treble: null,
  driveNode: null,
  chorusMix: null,
  chorusDelayL: null,
  chorusDelayR: null,
  chorusLfo: null,
  chorusWetL: null,
  chorusWetR: null,
  spaceMix: null,
  spaceDelay1: null,
  spaceDelay2: null,
  compNode: null,
  analyser: null,
  lfo: null,
  lfoG1: null,
  lfoG2: null,
  midi: null,
  noise: null,
  waveCache: {},
  meterRAF: null,
  sustain: false,
  held: new Set(),
  sustained: new Set(),
  active: new Map(),
  maxNotes: 24,
  global: {
    volume: 0.82,
    balance: 0,
    bass: 0,
    treble: 0,
    tremSpeed: 4,
    tremDepth: 0.22,
    trem1: true,
    trem2: true,
    velCurve: 'normal',
    comp: 0.42,
    drive: 0.08,
    chorus: 0.18,
    space: 0.10
  },
  ch: {
    1: { voice: 'piano1', pitch: -0.02, decay: 4.5, attack: 0.48 },
    2: { voice: 'piano2', pitch: 0.05, decay: 4.5, attack: 0.52 }
  },
  range: { low: 36, high: 84 }
};

const voices = {
  piano1: { partials: [1, 0.44, 0.22, 0.10, 0.05], attackTone: 0.22, noise: 0.010, click: 0.012, inh: 0.0030, bright0: 2600, bright1: 1050, brightDecay: 0.42, body: 820, gain: 2.4, q: 0.95, decayScale: 1.0, rel: 0.46, pan: 0.23, harpsi: false },
  piano2: { partials: [1, 0.58, 0.31, 0.16, 0.08, 0.03], attackTone: 0.28, noise: 0.012, click: 0.011, inh: 0.0045, bright0: 3400, bright1: 1350, brightDecay: 0.34, body: 1080, gain: 2.7, q: 1.05, decayScale: 0.92, rel: 0.40, pan: 0.26, harpsi: false },
  piano3: { partials: [1, 0.66, 0.39, 0.22, 0.12, 0.05], attackTone: 0.35, noise: 0.014, click: 0.010, inh: 0.0065, bright0: 4300, bright1: 1650, brightDecay: 0.26, body: 1480, gain: 3.0, q: 1.18, decayScale: 0.82, rel: 0.34, pan: 0.28, harpsi: false },
  harpsi: { partials: [1, 0.78, 0.56, 0.38, 0.20, 0.11, 0.05], attackTone: 0.14, noise: 0.006, click: 0.006, inh: 0.0100, bright0: 5600, bright1: 2400, brightDecay: 0.16, body: 2200, gain: 2.0, q: 1.7, decayScale: 0.72, rel: 0.30, pan: 0.20, harpsi: true }
};

const presets = {
  cpClassic: { g: { volume: 0.82, balance: 0, bass: 0, treble: 0.08, tremSpeed: 4, tremDepth: 0.22, trem1: true, trem2: true, comp: 0.42, drive: 0.08, chorus: 0.18, space: 0.10 }, c1: { voice: 'piano1', pitch: -0.02, decay: 4.5, attack: 0.48 }, c2: { voice: 'piano2', pitch: 0.05, decay: 4.5, attack: 0.52 } },
  cpBright: { g: { volume: 0.80, balance: 0.03, bass: -0.05, treble: 0.22, tremSpeed: 4.6, tremDepth: 0.18, trem1: true, trem2: false, comp: 0.46, drive: 0.12, chorus: 0.12, space: 0.08 }, c1: { voice: 'piano2', pitch: -0.03, decay: 4.5, attack: 0.56 }, c2: { voice: 'piano3', pitch: 0.05, decay: 4.5, attack: 0.60 } },
  cpDark: { g: { volume: 0.80, balance: -0.08, bass: 0.18, treble: -0.18, tremSpeed: 3.6, tremDepth: 0.16, trem1: false, trem2: true, comp: 0.40, drive: 0.05, chorus: 0.08, space: 0.12 }, c1: { voice: 'piano1', pitch: -0.02, decay: 4.5, attack: 0.42 }, c2: { voice: 'piano1', pitch: 0.03, decay: 4.5, attack: 0.46 } },
  harpsiMix: { g: { volume: 0.76, balance: 0.02, bass: -0.08, treble: 0.20, tremSpeed: 4.8, tremDepth: 0.12, trem1: true, trem2: true, comp: 0.36, drive: 0.04, chorus: 0.10, space: 0.06 }, c1: { voice: 'harpsi', pitch: 0, decay: 4.5, attack: 0.34 }, c2: { voice: 'piano2', pitch: 0.05, decay: 4.5, attack: 0.52 } },
  chorusedWide: { g: { volume: 0.78, balance: 0, bass: 0.05, treble: 0.10, tremSpeed: 4.2, tremDepth: 0.08, trem1: false, trem2: false, comp: 0.44, drive: 0.06, chorus: 0.34, space: 0.12 }, c1: { voice: 'piano2', pitch: -0.08, decay: 4.5, attack: 0.50 }, c2: { voice: 'piano2', pitch: 0.08, decay: 4.5, attack: 0.50 } },
  tremShow: { g: { volume: 0.78, balance: 0, bass: 0, treble: 0.12, tremSpeed: 5.4, tremDepth: 0.42, trem1: true, trem2: true, comp: 0.48, drive: 0.10, chorus: 0.14, space: 0.10 }, c1: { voice: 'piano1', pitch: -0.03, decay: 4.5, attack: 0.48 }, c2: { voice: 'piano3', pitch: 0.06, decay: 4.5, attack: 0.58 } }
};

function clamp(x, a, b) { return Math.min(b, Math.max(a, x)); }
function freq(n) { return 440 * Math.pow(2, (n - 69) / 12); }
function nlabel(n) { return noteNames[n % 12] + (Math.floor(n / 12) - 1); }
function now() { return state.ctx ? state.ctx.currentTime : 0; }

function velocityCurve(v) {
  const x = clamp(v / 127, 0, 1);
  if (state.global.velCurve === 'soft') return Math.pow(x, 0.75);
  if (state.global.velCurve === 'hard') return Math.pow(x, 1.55);
  return Math.pow(x, 1.05);
}

function getNoiseBuffer() {
  if (state.noise) return state.noise;
  const c = state.ctx;
  const sr = c.sampleRate;
  const len = Math.floor(sr * 0.05);
  const buf = c.createBuffer(1, len, sr);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (len * 0.18));
  state.noise = buf;
  return buf;
}

function getWave(name, v) {
  if (state.waveCache[name]) return state.waveCache[name];
  const c = state.ctx;
  const n = v.partials.length;
  const real = new Float32Array(n + 1);
  const imag = new Float32Array(n + 1);
  for (let i = 1; i <= n; i++) imag[i] = v.partials[i - 1];
  state.waveCache[name] = c.createPeriodicWave(real, imag, { disableNormalization: false });
  return state.waveCache[name];
}

function makeDriveCurve(amount) {
  const k = 1 + amount * 24;
  const n = 1024;
  const curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = i * 2 / n - 1;
    curve[i] = Math.tanh(x * (1 + amount * 3.2)) * (0.92 - amount * 0.08);
  }
  return curve;
}

function makeCtx() {
  if (state.ctx) return;
  const c = new (window.AudioContext || window.webkitAudioContext)();
  state.ctx = c;

  state.inputBus = c.createGain();
  state.master = c.createGain();
  state.bass = c.createBiquadFilter();
  state.treble = c.createBiquadFilter();
  state.driveNode = c.createWaveShaper();
  state.chorusMix = c.createGain();
  state.spaceMix = c.createGain();
  state.compNode = c.createDynamicsCompressor();
  const limiter = c.createDynamicsCompressor();
  state.analyser = c.createAnalyser();

  state.bass.type = 'lowshelf';
  state.bass.frequency.value = 220;
  state.treble.type = 'highshelf';
  state.treble.frequency.value = 2600;

  state.chorusDelayL = c.createDelay(0.05);
  state.chorusDelayR = c.createDelay(0.05);
  state.chorusWetL = c.createGain();
  state.chorusWetR = c.createGain();
  state.chorusWetL.gain.value = 0.5;
  state.chorusWetR.gain.value = 0.5;
  state.chorusLfo = c.createOscillator();
  const chorusDepthL = c.createGain();
  const chorusDepthR = c.createGain();
  chorusDepthL.gain.value = 0.0048;
  chorusDepthR.gain.value = -0.0058;
  state.chorusLfo.frequency.value = 0.14;
  state.chorusLfo.connect(chorusDepthL);
  state.chorusLfo.connect(chorusDepthR);
  chorusDepthL.connect(state.chorusDelayL.delayTime);
  chorusDepthR.connect(state.chorusDelayR.delayTime);
  state.chorusDelayL.delayTime.value = 0.016;
  state.chorusDelayR.delayTime.value = 0.029;

  state.spaceDelay1 = c.createDelay(0.3);
  state.spaceDelay2 = c.createDelay(0.3);
  const fb1 = c.createGain();
  const fb2 = c.createGain();
  fb1.gain.value = 0.22;
  fb2.gain.value = 0.18;
  state.spaceDelay1.delayTime.value = 0.14;
  state.spaceDelay2.delayTime.value = 0.22;
  state.spaceDelay1.connect(fb1); fb1.connect(state.spaceDelay1);
  state.spaceDelay2.connect(fb2); fb2.connect(state.spaceDelay2);

  state.compNode.threshold.value = -20;
  state.compNode.knee.value = 24;
  state.compNode.ratio.value = 2.8;
  state.compNode.attack.value = 0.008;
  state.compNode.release.value = 0.22;

  limiter.threshold.value = -3;
  limiter.knee.value = 0;
  limiter.ratio.value = 20;
  limiter.attack.value = 0.001;
  limiter.release.value = 0.08;

  state.analyser.fftSize = 1024;
  state.master.gain.value = 0.8;

  state.inputBus.connect(state.bass);
  state.bass.connect(state.treble);
  state.treble.connect(state.driveNode);
  state.driveNode.connect(state.compNode);
  state.driveNode.connect(state.chorusDelayL);
  state.driveNode.connect(state.chorusDelayR);
  state.chorusDelayL.connect(state.chorusWetL);
  state.chorusDelayR.connect(state.chorusWetR);
  state.chorusWetL.connect(state.chorusMix);
  state.chorusWetR.connect(state.chorusMix);
  state.chorusMix.connect(state.compNode);

  state.compNode.connect(state.master);
  state.compNode.connect(state.spaceDelay1);
  state.compNode.connect(state.spaceDelay2);
  state.spaceDelay1.connect(state.spaceMix);
  state.spaceDelay2.connect(state.spaceMix);
  state.spaceMix.connect(state.master);

  state.master.connect(limiter);
  limiter.connect(state.analyser);
  state.analyser.connect(c.destination);

  state.lfo = c.createOscillator();
  state.lfo.type = 'sine';
  state.lfoG1 = c.createGain();
  state.lfoG2 = c.createGain();
  state.lfo.connect(state.lfoG1);
  state.lfo.connect(state.lfoG2);
  state.lfo.start();
  state.chorusLfo.start();

  getNoiseBuffer();
  updateAudio();
  startMeter();
}

function updateAudio() {
  if (!state.ctx) return;
  const t = now();
  state.master.gain.setTargetAtTime(state.global.volume, t, 0.02);
  state.bass.gain.setTargetAtTime(state.global.bass * 8, t, 0.03);
  state.treble.gain.setTargetAtTime(state.global.treble * 8, t, 0.03);
  state.lfo.frequency.setTargetAtTime(state.global.tremSpeed, t, 0.02);
  state.lfoG1.gain.setTargetAtTime(0.5 * (state.global.trem1 ? state.global.tremDepth : 0), t, 0.03);
  state.lfoG2.gain.setTargetAtTime(0.5 * (state.global.trem2 ? state.global.tremDepth : 0), t, 0.03);
  state.driveNode.curve = makeDriveCurve(state.global.drive);
  state.driveNode.oversample = '4x';
  state.chorusMix.gain.setTargetAtTime(state.global.chorus * 0.95, t, 0.03);
  state.spaceMix.gain.setTargetAtTime(state.global.space * 0.38, t, 0.04);
  const compAmt = state.global.comp;
  state.compNode.threshold.setTargetAtTime(-12 - compAmt * 16, t, 0.03);
  state.compNode.ratio.setTargetAtTime(1.6 + compAmt * 4.4, t, 0.03);
  state.compNode.knee.setTargetAtTime(10 + compAmt * 24, t, 0.03);
  state.compNode.attack.setTargetAtTime(0.02 - compAmt * 0.014, t, 0.03);
  state.compNode.release.setTargetAtTime(0.28 - compAmt * 0.12, t, 0.03);
}

function createChannelLayer(ch, midiNote, velocity) {
  const c = state.ctx;
  const cfg = state.ch[ch];
  const v = voices[cfg.voice];
  const vv = velocityCurve(velocity);
  const f = freq(midiNote) * Math.pow(2, cfg.pitch / 12);
  const t = now();

  const decay = Math.max(v.harpsi ? 0.22 : 0.16, cfg.decay * v.decayScale * (1.05 - vv * 0.18));
  const sustainBoost = state.sustain ? 1.8 : 1.0;
  const release = Math.max(v.harpsi ? 0.12 : 0.10, decay * v.rel * sustainBoost);

  const out = c.createGain();
  out.gain.value = 0.0001;

  const trem = c.createGain();
  trem.gain.value = 1 - 0.5 * (((ch === 1 && state.global.trem1) || (ch === 2 && state.global.trem2)) ? state.global.tremDepth : 0);
  (ch === 1 ? state.lfoG1 : state.lfoG2).connect(trem.gain);

  const pan = c.createStereoPanner();
  pan.pan.value = ch === 1 ? clamp(-v.pan - state.global.balance * 0.7, -1, 1) : clamp(v.pan - state.global.balance * 0.7, -1, 1);

  const low = c.createBiquadFilter();
  low.type = 'lowpass';
  low.Q.value = v.harpsi ? 1.25 : (0.95 + cfg.attack * 0.25);

  const body = c.createBiquadFilter();
  body.type = 'peaking';

  const ampIR = c.createBiquadFilter();
  ampIR.type = 'lowpass';
  body.frequency.value = v.body * (1 + (midiNote - 60) * 0.004);
  body.Q.value = v.q;
  body.gain.value = v.gain + cfg.attack * 1.4 + vv * 1.2 + (ch === 1 ? 0.1 : -0.06);
  ampIR.frequency.value = v.harpsi ? 3600 : 4200 - state.global.drive * 900;
  ampIR.Q.value = 0.4 + state.global.drive * 0.25;

  const main = c.createOscillator();
  main.setPeriodicWave(getWave(cfg.voice, v));
  main.frequency.value = f;
  const mainG = c.createGain();
  mainG.gain.value = 0.42 + vv * 0.12;
  main.connect(mainG);
  mainG.connect(low);
  main.start();

  const atk = c.createOscillator();
  atk.type = v.harpsi ? 'square' : 'triangle';
  atk.frequency.value = f * (2.0 + v.inh * 8);
  const atkG = c.createGain();
  atkG.gain.value = v.attackTone * (v.harpsi ? (0.08 + cfg.attack * 0.28 + vv * 0.10) : (0.12 + cfg.attack * 0.55 + vv * 0.22));
  atk.connect(atkG);
  atkG.connect(low);
  atk.start();

  const upper = [];
  for (let i = 2; i <= Math.min(v.partials.length, 5); i++) {
    const o = c.createOscillator();
    o.type = 'sine';
    o.frequency.value = f * i * (1 + v.inh * (i - 1) * (i - 1));
    const g = c.createGain();
    g.gain.value = v.partials[i - 1] * 0.05 * (0.45 + cfg.attack * 0.3 + vv * 0.2);
    o.connect(g);
    g.connect(low);
    o.start();
    upper.push({ o, g });
  }

  const noise = c.createBufferSource();
  noise.buffer = getNoiseBuffer();
  const nf = c.createBiquadFilter();
  nf.type = 'bandpass';
  nf.frequency.value = v.harpsi ? 3200 : (2500 + cfg.attack * 1200);
  nf.Q.value = 0.55;
  const ng = c.createGain();
  ng.gain.value = v.noise * (0.22 + cfg.attack * 0.45 + vv * 0.25);
  noise.connect(nf);
  nf.connect(ng);
  ng.connect(low);
  noise.start();

  const click = c.createOscillator();
  click.type = 'triangle';
  click.frequency.value = Math.min(12000, f * 4.3);
  const cg = c.createGain();
  cg.gain.value = v.click * (0.18 + cfg.attack * 0.35 + vv * 0.2);
  click.connect(cg);
  cg.connect(low);
  click.start();

  low.connect(body);
  body.connect(ampIR);
  ampIR.connect(out);
  out.connect(trem);
  trem.connect(pan);
  pan.connect(state.inputBus);

  const b0 = v.bright0 + cfg.attack * 1200 + vv * 900 + clamp((midiNote - 60) * 16, -420, 650);
  const b1 = v.bright1 + state.global.bass * (-120) + clamp((midiNote - 60) * 4, -100, 180);
  low.frequency.setValueAtTime(Math.max(200, b0), t);
  low.frequency.exponentialRampToValueAtTime(Math.max(180, b1), t + Math.max(0.05, decay * v.brightDecay));

  out.gain.setValueAtTime(0.0001, t);
  out.gain.exponentialRampToValueAtTime(0.16 + vv * 0.18, t + (v.harpsi ? 0.001 : 0.0025));
  const midLevel = v.harpsi ? (0.04 + vv * 0.024) : (0.068 + vv * 0.03);
  out.gain.exponentialRampToValueAtTime(midLevel, t + Math.max(0.05, decay * 0.16));
  out.gain.exponentialRampToValueAtTime(0.0001, t + decay);

  atkG.gain.setValueAtTime(atkG.gain.value, t);
  atkG.gain.exponentialRampToValueAtTime(0.0001, t + Math.max(v.harpsi ? 0.05 : 0.03, decay * (v.harpsi ? 0.18 : 0.12)));
  ng.gain.setValueAtTime(ng.gain.value, t);
  ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.026);
  cg.gain.setValueAtTime(cg.gain.value, t);
  cg.gain.exponentialRampToValueAtTime(0.0001, t + 0.022);

  const cleanup = () => {
    [main, atk, noise, click].forEach(node => { try { node.disconnect(); } catch {} });
    [mainG, atkG, nf, ng, cg, low, body, ampIR, out, trem, pan].forEach(node => { try { node.disconnect(); } catch {} });
    upper.forEach(({ o, g }) => { try { o.disconnect(); } catch {} try { g.disconnect(); } catch {} });
  };

  return {
    stop(immediate = false) {
      const tt = now();
      const r = immediate ? Math.min(0.08, release) : release;
      out.gain.cancelScheduledValues(tt);
      out.gain.setValueAtTime(Math.max(out.gain.value, 0.0001), tt);
      out.gain.exponentialRampToValueAtTime(0.0001, tt + r);
      [main, atk, ...upper.map(x => x.o), noise, click].forEach(node => {
        try { node.stop(tt + r + 0.05); } catch {}
      });
      window.setTimeout(cleanup, Math.ceil((r + 0.08) * 1000));
    }
  };
}

function updateVoiceReadout() { $('voicesReadout').textContent = state.active.size; }

function noteOn(n, velocity = 110) {
  makeCtx();
  if (state.ctx.state !== 'running') state.ctx.resume();
  if (state.active.has(n)) noteOff(n, true);
  if (state.active.size >= state.maxNotes) {
    const oldest = state.active.keys().next().value;
    if (oldest !== undefined) noteOff(oldest, true);
  }
  const layers = [createChannelLayer(1, n, velocity), createChannelLayer(2, n, velocity)];
  state.active.set(n, { layers });
  state.held.add(n);
  paintKeys();
  updateVoiceReadout();
}

function noteOff(n, immediate = false) {
  state.held.delete(n);
  if (state.sustain && !immediate) {
    if (state.active.has(n)) state.sustained.add(n);
    paintKeys();
    return;
  }
  const entry = state.active.get(n);
  if (!entry) return;
  entry.layers.forEach(layer => layer.stop(immediate));
  state.active.delete(n);
  state.sustained.delete(n);
  paintKeys();
  updateVoiceReadout();
}

function allNotesOff(immediate = true) {
  [...state.active.keys()].forEach(n => noteOff(n, immediate));
  state.held.clear();
  state.sustained.clear();
  paintKeys();
  updateVoiceReadout();
}

function releaseSustain() {
  [...state.sustained].filter(n => !state.held.has(n)).forEach(n => noteOff(n, false));
  state.sustained.clear();
}

function buildKeys() {
  const el = $('kbd');
  el.innerHTML = '';
  const whites = [];
  for (let n = state.range.low; n <= state.range.high; n++) if (!blackSet.has(n % 12)) whites.push(n);
  const ww = 100 / whites.length;
  let wi = 0;
  for (let n = state.range.low; n <= state.range.high; n++) {
    const k = document.createElement('div');
    const black = blackSet.has(n % 12);
    k.dataset.note = n;
    k.textContent = nlabel(n);
    if (!black) {
      k.className = 'w';
      k.style.left = `${wi * ww}%`;
      k.style.width = `${ww}%`;
      wi++;
    } else {
      const pos = wi - 1;
      k.className = 'b';
      k.style.left = `${(pos + 0.68) * ww}%`;
      k.style.width = `${ww * 0.64}%`;
    }
    let down = false;
    k.onpointerdown = async e => {
      e.preventDefault();
      down = true;
      makeCtx();
      await state.ctx.resume();
      noteOn(n, 110);
    };
    const up = e => {
      e.preventDefault();
      if (!down) return;
      down = false;
      noteOff(n);
    };
    k.onpointerup = up;
    k.onpointerleave = up;
    k.onpointercancel = up;
    el.appendChild(k);
  }
}

function paintKeys() {
  document.querySelectorAll('[data-note]').forEach(el => {
    const n = +el.dataset.note;
    el.classList.toggle('on', state.held.has(n) || state.sustained.has(n) || state.active.has(n));
  });
}

function syncUI() {
  ['volume', 'balance', 'bass', 'treble', 'tremSpeed', 'tremDepth', 'comp', 'drive', 'chorus', 'space'].forEach(id => state.global[id] = +$(id).value);
  state.ch[1].voice = $('voice1').value;
  state.ch[2].voice = $('voice2').value;
  state.ch[1].pitch = +$('pitch1').value;
  state.ch[2].pitch = +$('pitch2').value;
  state.ch[1].decay = +$('decay1').value;
  state.ch[2].decay = +$('decay2').value;
  state.ch[1].attack = +$('attack1').value;
  state.ch[2].attack = +$('attack2').value;
  state.global.velCurve = $('velCurve').value;
  state.maxNotes = +$('poly').value;
  updateAudio();
}

function applyPreset(name) {
  allNotesOff(true);
  const p = presets[name];
  Object.assign(state.global, p.g);
  Object.assign(state.ch[1], p.c1);
  Object.assign(state.ch[2], p.c2);
  $('volume').value = state.global.volume;
  $('balance').value = state.global.balance;
  $('bass').value = state.global.bass;
  $('treble').value = state.global.treble;
  $('tremSpeed').value = state.global.tremSpeed;
  $('tremDepth').value = state.global.tremDepth;
  $('comp').value = state.global.comp;
  $('drive').value = state.global.drive;
  $('chorus').value = state.global.chorus;
  $('space').value = state.global.space;
  $('voice1').value = state.ch[1].voice;
  $('voice2').value = state.ch[2].voice;
  $('pitch1').value = state.ch[1].pitch;
  $('pitch2').value = state.ch[2].pitch;
  $('decay1').value = state.ch[1].decay;
  $('decay2').value = state.ch[2].decay;
  $('attack1').value = state.ch[1].attack;
  $('attack2').value = state.ch[2].attack;
  $('trem1').classList.toggle('active', state.global.trem1);
  $('trem2').classList.toggle('active', state.global.trem2);
  syncUI();
}

async function enableMIDI() {
  if (!window.isSecureContext) { $('midiInfo').textContent = 'needs https/secure context'; return; }
  if (!navigator.requestMIDIAccess) { $('midiInfo').textContent = 'Web MIDI not supported here'; return; }
  try {
    makeCtx();
    if (state.ctx && state.ctx.state !== 'running') await state.ctx.resume();
    state.midi = await navigator.requestMIDIAccess({ sysex: false });
    const bindInputs = () => {
      const inputs = [...state.midi.inputs.values()];
      inputs.forEach(i => i.onmidimessage = onMIDI);
      $('midiInfo').textContent = inputs.length ? inputs.map(i => i.name || 'MIDI input').join(', ') : 'enabled, no device detected';
    };
    bindInputs();
    state.midi.onstatechange = bindInputs;
  } catch (e) {
    $('midiInfo').textContent = `MIDI error: ${e && e.message ? e.message : 'access failed'}`;
  }
}

function onMIDI(e) {
  const [s, d1, d2] = e.data;
  const cmd = s & 0xf0;
  if (cmd === 0x90 && d2 > 0) noteOn(d1, d2);
  else if (cmd === 0x80 || (cmd === 0x90 && d2 === 0)) noteOff(d1);
  else if (cmd === 0xb0) {
    if (d1 === 64) {
      state.sustain = d2 >= 64;
      $('sustain').classList.toggle('active', state.sustain);
      if (!state.sustain) releaseSustain();
    }
    if (d1 === 1) {
      $('tremDepth').value = state.global.tremDepth = clamp(d2 / 127 * 0.6, 0, 0.6);
      updateAudio();
    }
    if (d1 === 7) {
      $('volume').value = state.global.volume = clamp(d2 / 127 * 1.2, 0, 1.2);
      updateAudio();
    }
  }
}

function startMeter() {
  if (state.meterRAF) cancelAnimationFrame(state.meterRAF);
  const data = new Uint8Array(512);
  const loop = () => {
    if (state.analyser) {
      state.analyser.getByteTimeDomainData(data);
      let p = 0;
      for (let i = 0; i < data.length; i++) p = Math.max(p, Math.abs(data[i] - 128));
      $('meterBar').style.width = `${clamp(p / 72 * 100, 0, 100)}%`;
    }
    state.meterRAF = requestAnimationFrame(loop);
  };
  state.meterRAF = requestAnimationFrame(loop);
}

$('audioBtn').onclick = async () => {
  makeCtx();
  await state.ctx.resume();
  $('status').textContent = state.ctx.state;
};
$('midiBtn').onclick = enableMIDI;
$('preset').onchange = e => applyPreset(e.target.value);
['volume', 'balance', 'bass', 'treble', 'tremSpeed', 'tremDepth', 'comp', 'drive', 'chorus', 'space', 'voice1', 'voice2', 'pitch1', 'pitch2', 'decay1', 'decay2', 'attack1', 'attack2', 'poly', 'velCurve'].forEach(id => $(id).oninput = syncUI);
$('trem1').addEventListener('click', (e) => {
  e.preventDefault();
  state.global.trem1 = !state.global.trem1;
  $('trem1').classList.toggle('active', state.global.trem1);
  updateAudio();
});
$('trem2').addEventListener('click', (e) => {
  e.preventDefault();
  state.global.trem2 = !state.global.trem2;
  $('trem2').classList.toggle('active', state.global.trem2);
  updateAudio();
});
$('sustain').addEventListener('click', (e) => {
  e.preventDefault();
  state.sustain = !state.sustain;
  $('sustain').classList.toggle('active', state.sustain);
  if (!state.sustain) releaseSustain();
  paintKeys();
});

const downKeys = new Set();
window.addEventListener('keydown', async e => {
  if (e.repeat) return;
  if (e.code === 'Space') { e.preventDefault(); $('sustain').click(); return; }
  const n = keyMap[e.key];
  if (n == null || downKeys.has(e.key)) return;
  downKeys.add(e.key);
  makeCtx();
  await state.ctx.resume();
  noteOn(n, 108);
});
window.addEventListener('keyup', e => {
  downKeys.delete(e.key);
  const n = keyMap[e.key];
  if (n != null) noteOff(n);
});
window.addEventListener('blur', () => {
  downKeys.clear();
  allNotesOff(true);
});

buildKeys();
applyPreset('cpClassic');
</script>
</body>
</html>
