<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>JU-106 WEB</title>
<style>
:root{
  --body:#14161a;
  --body2:#1b1e23;
  --panel:#22262c;
  --panel2:#2b3038;
  --ink:#e9edf2;
  --muted:#a8b0bc;
  --line:#07080a;
  --thin:#3a3f48;
  --juno-red:#df2f3f;
  --juno-orange:#e9822f;
  --juno-yellow:#f0c241;
  --juno-green:#44b96a;
  --juno-blue:#2f88d8;
  --juno-purple:#7664c8;
  --keywhite:#f1f1ee;
  --keyedge:#b9b9b3;
  --keyblack:#090a0d;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:radial-gradient(circle at top,#363c46 0,#111318 48%,#07080a 100%);
  color:var(--ink);
  font-family:Arial,Helvetica,sans-serif;
  display:flex;
  justify-content:center;
  align-items:flex-start;
  padding:18px;
  user-select:none;
}
.synth{
  width:min(1180px,100%);
  background:linear-gradient(#252932,#111317);
  border:3px solid #07080a;
  border-radius:8px;
  box-shadow:0 35px 90px rgba(0,0,0,.65),inset 0 1px 0 rgba(255,255,255,.08);
  overflow:hidden;
}
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:14px;
  padding:14px 18px 12px;
  background:linear-gradient(#2c3139,#191c22);
  border-bottom:4px solid #07080a;
}
h1{
  margin:0;
  font-size:clamp(1.55rem,3vw,2.45rem);
  letter-spacing:.055em;
  font-weight:800;
  color:#f4f6f8;
  text-shadow:0 2px 0 #000;
}
.sub{color:#c6cbd3;font-size:.86rem;letter-spacing:.04em}
.bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
button,select{
  background:linear-gradient(#313743,#171a20);
  color:#f0f3f6;
  border:2px solid #050607;
  border-radius:3px;
  padding:8px 11px;
  font-weight:800;
  cursor:pointer;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 2px 0 #050607;
  text-transform:uppercase;
  font-size:.75rem;
  letter-spacing:.04em;
}
button:hover,select:hover{filter:brightness(1.12)}
button.on{background:linear-gradient(#55616f,#2d3540);border-color:#08090b}
.panic{background:linear-gradient(#64232a,#241014);color:#ffd7dc}.panic:hover{background:linear-gradient(#963642,#351419)}
.light{width:11px;height:11px;border-radius:50%;background:#353b43;border:1px solid #050607;box-shadow:inset 0 1px 2px rgba(255,255,255,.2)}
.light.on{background:var(--juno-green);box-shadow:0 0 12px var(--juno-green),inset 0 1px 2px rgba(255,255,255,.35)}
.panel{
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:0;
  padding:0;
  background:#0a0b0d;
  border-bottom:4px solid #07080a;
}
.section{
  position:relative;
  background:linear-gradient(#2b3038,#20242a);
  border-right:3px solid #07080a;
  border-bottom:3px solid #07080a;
  border-radius:0;
  padding:13px 12px 14px;
  min-height:196px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07);
}
.section:last-child{border-right:none}
.section::before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;height:7px;
  background:var(--stripe,#777);
  border-bottom:2px solid rgba(0,0,0,.75);
}
.section h2{
  margin:10px 0 12px;
  font-size:.77rem;
  letter-spacing:.17em;
  text-transform:uppercase;
  color:#f1f3f5;
  border-bottom:1px solid rgba(255,255,255,.16);
  padding-bottom:7px;
  text-shadow:0 1px 0 #000;
}
.dco{grid-column:span 3;--stripe:linear-gradient(90deg,var(--juno-red),var(--juno-orange))}
.hpf{grid-column:span 2;--stripe:var(--juno-orange)}
.vcf{grid-column:span 3;--stripe:linear-gradient(90deg,var(--juno-yellow),var(--juno-green))}
.vca{grid-column:span 2;--stripe:var(--juno-green)}
.chorus{grid-column:span 2;--stripe:linear-gradient(90deg,var(--juno-blue),var(--juno-purple))}
.env{grid-column:span 4;--stripe:linear-gradient(90deg,var(--juno-red),var(--juno-orange),var(--juno-yellow))}
.lfo{grid-column:span 3;--stripe:var(--juno-blue)}
.master{grid-column:span 3;--stripe:var(--juno-purple)}
.patches{grid-column:span 2;--stripe:#cfd4dc}
.controls{display:grid;grid-template-columns:repeat(auto-fit,minmax(70px,1fr));gap:10px;align-items:end}
.control{display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}
.control label{
  font-size:.66rem;
  color:#d0d5dd;
  text-transform:uppercase;
  letter-spacing:.075em;
  white-space:nowrap;
  font-weight:800;
}
.value{font-size:.68rem;color:#aeb7c3;min-height:1em;font-family:"Arial Narrow",Arial,sans-serif}
input[type=range]{width:82px;accent-color:#d7d9dc}
.vertical input[type=range]{
  writing-mode:bt-lr;
  -webkit-appearance:slider-vertical;
  appearance:slider-vertical;
  width:30px;
  height:112px;
  accent-color:#d7d9dc;
  cursor:ns-resize;
}
.toggles{display:flex;gap:6px;flex-wrap:wrap}
.toggle{
  min-width:55px;
  text-align:center;
  padding:8px 7px;
  border:2px solid #050607;
  border-radius:2px;
  background:linear-gradient(#343a44,#16191f);
  color:#7f8997;
  cursor:pointer;
  font-weight:900;
  font-size:.72rem;
  letter-spacing:.07em;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1),0 2px 0 #050607;
}
.toggle.on{
  color:#121417;
  border-color:#050607;
  background:linear-gradient(#f4d467,#d39422);
  box-shadow:0 0 10px rgba(240,194,65,.24),inset 0 1px 0 rgba(255,255,255,.35),0 2px 0 #050607;
}
.keyboard-wrap{padding:0 16px 18px;background:linear-gradient(#101216,#090a0c)}
.keyboard{
  position:relative;
  height:178px;
  background:#06070a;
  border:3px solid #030405;
  border-top:none;
  border-radius:0 0 7px 7px;
  padding:0 8px 8px;
  display:flex;
  overflow:hidden;
  box-shadow:inset 0 12px 25px rgba(0,0,0,.72);
}
.key.white{
  position:relative;
  flex:1;
  min-width:28px;
  background:linear-gradient(#fff,#deded9 62%,#c8c8c2);
  border:1px solid var(--keyedge);
  border-top:none;
  border-radius:0 0 5px 5px;
  margin:0 1px;
  color:#202327;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  font-size:.65rem;
  padding-bottom:8px;
  box-shadow:inset 0 -10px 14px rgba(0,0,0,.16);
}
.key.black{
  position:absolute;
  top:0;
  width:3.2%;
  height:62%;
  background:linear-gradient(#242832,#040507 70%,#000);
  border:1px solid #000;
  border-top:none;
  border-radius:0 0 4px 4px;
  z-index:5;
  transform:translateX(-50%);
  box-shadow:0 6px 10px rgba(0,0,0,.75),inset 0 -5px 8px rgba(255,255,255,.04);
}
.key.on.white{background:linear-gradient(#ffe7a0,#efbd42)}
.key.on.black{background:linear-gradient(#6f5119,#241804)}
.footer{
  padding:12px 18px 18px;
  color:#aab2bf;
  background:#090a0d;
  font-size:.84rem;
  display:flex;
  justify-content:space-between;
  gap:16px;
  flex-wrap:wrap;
  border-top:1px solid #232831;
}
.leds{display:flex;gap:4px}.vled{width:8px;height:8px;border-radius:50%;background:#343a42;border:1px solid #050607}.vled.on{background:var(--juno-green);box-shadow:0 0 9px var(--juno-green)}
@media(max-width:900px){.dco,.hpf,.vcf,.vca,.chorus,.env,.lfo,.master,.patches{grid-column:span 6}header{flex-direction:column;align-items:flex-start}.bar{justify-content:flex-start}}@media(max-width:620px){.panel{grid-template-columns:repeat(6,1fr)}.dco,.hpf,.vcf,.vca,.chorus,.env,.lfo,.master,.patches{grid-column:span 6}.keyboard{height:138px}}
</style>
</head>
<body>
<div class="synth">
<header>
  <div><h1>JU-106 WEB</h1><div class="sub">8-voice DCO polysynth inspired by the Roland Juno-106</div></div>
  <div class="bar"><span class="light" id="midiLight"></span><span id="midiStatus" class="sub">MIDI not connected</span><select id="midiSelect"><option>No MIDI inputs</option></select><button id="panicBtn" class="panic">Panic</button><button id="startBtn">Start Audio</button></div>
</header>
<main class="panel">
<section class="section dco"><h2>DCO</h2><div class="toggles"><div class="toggle on" data-toggle="saw">SAW</div><div class="toggle on" data-toggle="pulse">PULSE</div><div class="toggle on" data-toggle="sub">SUB</div><div class="toggle" data-toggle="noise">NOISE</div></div><div class="controls" style="margin-top:12px"><div class="control vertical"><label>Pulse Width</label><input id="pw" type="range" min="0.08" max="0.92" step="0.01" value="0.48"><span class="value"></span></div><div class="control vertical"><label>PWM</label><input id="pwm" type="range" min="0" max="1" step="0.01" value="0.22"><span class="value"></span></div><div class="control vertical"><label>Sub</label><input id="subLevel" type="range" min="0" max="1" step="0.01" value="0.42"><span class="value"></span></div><div class="control vertical"><label>Noise</label><input id="noiseLevel" type="range" min="0" max="1" step="0.01" value="0.08"><span class="value"></span></div></div></section>
<section class="section hpf"><h2>HPF</h2><div class="controls"><div class="control vertical"><label>Cutoff</label><input id="hpf" type="range" min="20" max="1200" step="1" value="80"><span class="value"></span></div></div></section>
<section class="section vcf"><h2>VCF</h2><div class="controls"><div class="control vertical"><label>Cutoff</label><input id="cutoff" type="range" min="80" max="11000" step="1" value="2600"><span class="value"></span></div><div class="control vertical"><label>Res</label><input id="resonance" type="range" min="0" max="24" step="0.1" value="5.5"><span class="value"></span></div><div class="control vertical"><label>Env</label><input id="filterEnv" type="range" min="-1" max="1" step="0.01" value="0.38"><span class="value"></span></div><div class="control vertical"><label>LFO</label><input id="filterLfo" type="range" min="0" max="1" step="0.01" value="0.05"><span class="value"></span></div></div></section>
<section class="section vca"><h2>VCA</h2><div class="controls"><div class="control vertical"><label>Level</label><input id="vca" type="range" min="0" max="1" step="0.01" value="0.72"><span class="value"></span></div><div class="control vertical"><label>Velocity</label><input id="velocity" type="range" min="0" max="1" step="0.01" value="0.28"><span class="value"></span></div></div></section>
<section class="section chorus"><h2>Chorus</h2><div class="toggles"><div class="toggle on" data-chorus="1">I</div><div class="toggle" data-chorus="2">II</div></div><div class="controls" style="margin-top:12px"><div class="control"><label>Mix</label><input id="chorusMix" type="range" min="0" max="1" step="0.01" value="0.42"><span class="value"></span></div><div class="control"><label>Width</label><input id="chorusWidth" type="range" min="0" max="1" step="0.01" value="0.7"><span class="value"></span></div></div></section>
<section class="section env"><h2>Envelope</h2><div class="controls"><div class="control vertical"><label>Attack</label><input id="attack" type="range" min="0.002" max="2.5" step="0.001" value="0.014"><span class="value"></span></div><div class="control vertical"><label>Decay</label><input id="decay" type="range" min="0.01" max="4" step="0.01" value="0.68"><span class="value"></span></div><div class="control vertical"><label>Sustain</label><input id="sustain" type="range" min="0" max="1" step="0.01" value="0.58"><span class="value"></span></div><div class="control vertical"><label>Release</label><input id="release" type="range" min="0.01" max="7" step="0.01" value="1.9"><span class="value"></span></div></div></section>
<section class="section lfo"><h2>LFO</h2><div class="controls"><div class="control vertical"><label>Rate</label><input id="lfoRate" type="range" min="0.05" max="12" step="0.01" value="0.68"><span class="value"></span></div><div class="control vertical"><label>DCO</label><input id="lfoPitch" type="range" min="0" max="1" step="0.01" value="0.03"><span class="value"></span></div><div class="control vertical"><label>PWM Rate</label><input id="pwmRate" type="range" min="0.05" max="8" step="0.01" value="0.44"><span class="value"></span></div></div></section>
<section class="section master"><h2>Master</h2><div class="controls"><div class="control vertical"><label>Volume</label><input id="master" type="range" min="0" max="1" step="0.01" value="0.72"><span class="value"></span></div><div class="control vertical"><label>Glide</label><input id="glide" type="range" min="0" max="0.4" step="0.001" value="0.006"><span class="value"></span></div><div class="control vertical"><label>Detune</label><input id="detune" type="range" min="0" max="18" step="0.1" value="4.5"><span class="value"></span></div></div></section>
<section class="section patches"><h2>Patch</h2><div class="controls"><button data-patch="init">Init Brass</button><button data-patch="pad">Slow Pad</button><button data-patch="bass">Sub Bass</button><button data-patch="pluck">Poly Pluck</button></div></section>
</main>
<div class="keyboard-wrap"><div id="keyboard" class="keyboard"></div></div>
<div class="footer"><div>Computer keys: A W S E D F T G Y H U J K. MIDI supported. Z/X shifts octave.</div><div style="display:flex;align-items:center;gap:8px"><span id="voiceInfo">0 voices</span><span class="leds" id="vleds"></span></div></div>
</div>
<script>
'use strict';
const $=id=>document.getElementById(id);const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));const midiToFreq=n=>440*Math.pow(2,(n-69)/12);const VOICES=8;
const ids=['pw','pwm','subLevel','noiseLevel','hpf','cutoff','resonance','filterEnv','filterLfo','vca','velocity','chorusMix','chorusWidth','attack','decay','sustain','release','lfoRate','lfoPitch','pwmRate','master','glide','detune'];
const state=Object.fromEntries(ids.map(id=>[id,parseFloat($(id).value)]));const toggles={saw:true,pulse:true,sub:true,noise:false};
let ctx,synth,midiAccess,selectedMidi,octShift=0,chorusMode=1;const heldKeys=new Set();const heldNotes=new Set();
function noiseBuf(ac){const b=ac.createBuffer(1,ac.sampleRate*2,ac.sampleRate),d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;return b}
function pulseCurve(pw){const n=512,c=new Float32Array(n);const thresh=pw*2-1;for(let i=0;i<n;i++){const x=i/(n-1)*2-1;c[i]=x<thresh?-1:1}return c}function passCurve(){return new Float32Array([-1,1])}
function safeHold(param,t){try{param.cancelAndHoldAtTime(t)}catch(e){const v=param.value;param.cancelScheduledValues(t);param.setValueAtTime(v,t)}}
function attack(param,a,d,s,peak,t){
  param.cancelScheduledValues(t);
  param.setValueAtTime(0,t);
  param.linearRampToValueAtTime(Math.max(.0001,peak),t+Math.max(.002,a));
  param.setTargetAtTime(Math.max(.0001,peak*s),t+Math.max(.002,a),Math.max(.003,d)/3);
}
function filterAttack(param,a,d,s,t){
  param.cancelScheduledValues(t);
  param.setValueAtTime(0,t);
  param.linearRampToValueAtTime(1,t+Math.max(.002,a));
  param.setTargetAtTime(Math.max(0,s),t+Math.max(.002,a),Math.max(.003,d)/3);
}
function release(param,r,t){
  safeHold(param,t);
  param.setTargetAtTime(0,t,Math.max(.006,r)/3);
}
class Voice{
 constructor(ac,dest,noise){this.ctx=ac;this.active=false;this.note=-1;this.releaseTime=0;this.startTime=0;this.oSaw=ac.createOscillator();this.oPulse=ac.createOscillator();this.pwm=ac.createWaveShaper();this.oSub=ac.createOscillator();this.oNoise=ac.createBufferSource();this.gSaw=ac.createGain();this.gPulse=ac.createGain();this.gSub=ac.createGain();this.gNoise=ac.createGain();this.hpf=ac.createBiquadFilter();this.flt=ac.createBiquadFilter();this.vca=ac.createGain();this.pan=ac.createStereoPanner();this.fBase=ac.createConstantSource();this.fEnv=ac.createConstantSource();this.fEnvAmt=ac.createGain();this.ampTrim=ac.createGain();this.velSrc=ac.createConstantSource();this.oSaw.type='sawtooth';this.oPulse.type='sawtooth';this.pwm.curve=pulseCurve(.5);this.oSub.type='square';this.oNoise.buffer=noise;this.oNoise.loop=true;this.hpf.type='highpass';this.flt.type='lowpass';this.vca.gain.value=0;this.fBase.offset.value=1000;this.fEnv.offset.value=0;this.fEnvAmt.gain.value=0;this.oSaw.connect(this.gSaw);this.gSaw.connect(this.hpf);this.oPulse.connect(this.pwm);this.pwm.connect(this.gPulse);this.gPulse.connect(this.hpf);this.oSub.connect(this.gSub);this.gSub.connect(this.hpf);this.oNoise.connect(this.gNoise);this.gNoise.connect(this.hpf);this.hpf.connect(this.flt);this.fBase.connect(this.flt.frequency);this.fEnv.connect(this.fEnvAmt);this.fEnvAmt.connect(this.flt.frequency);this.flt.connect(this.ampTrim);this.ampTrim.connect(this.vca);this.vca.connect(this.pan);this.pan.connect(dest);[this.oSaw,this.oPulse,this.oSub,this.oNoise,this.fBase,this.fEnv,this.velSrc].forEach(n=>n.start())}
 noteOn(note,vel,p,lfoPitch,lfoFilter){
  const t=this.ctx.currentTime;
  this.active=true;this.note=note;this.startTime=t;
  const f=midiToFreq(note);
  const setF=o=>{if(p.glide>.001&&o.frequency.value>1){safeHold(o.frequency,t);o.frequency.linearRampToValueAtTime(f,t+p.glide)}else o.frequency.setValueAtTime(f,t)};
  setF(this.oSaw);setF(this.oPulse);this.oSub.frequency.setValueAtTime(f/2,t);
  const lfoCents=p._lfoNow*p.lfoPitch*70;
  this.oSaw.detune.setValueAtTime(-p.detune*.35+lfoCents,t);this.oPulse.detune.setValueAtTime(p.detune*.35+lfoCents,t);
  this.gSaw.gain.setValueAtTime(p.saw?.34:0,t);this.gPulse.gain.setValueAtTime(p.pulse?.34:0,t);this.gSub.gain.setValueAtTime(p.sub?p.subLevel*.55:0,t);this.gNoise.gain.setValueAtTime(p.noise?p.noiseLevel*.33:0,t);
  this.pwm.curve=pulseCurve(clamp(p.pw+p._pwmNow,0.05,.95));
  this.hpf.frequency.setValueAtTime(p.hpf,t);this.flt.Q.setValueAtTime(p.resonance,t);this.fBase.offset.setValueAtTime(clamp(p.cutoff+p._lfoNow*p.filterLfo*3200,30,18000),t);
  this.fEnvAmt.gain.setValueAtTime(p.filterEnv*7000,t);
  const vn=vel/127;
  const velScale=(1-p.velocity)+p.velocity*vn;
  this.ampTrim.gain.setValueAtTime(p.vca*velScale,t);
  attack(this.vca.gain,p.attack,p.decay,p.sustain,1,t);
  filterAttack(this.fEnv.offset,p.attack,p.decay,p.sustain,t);
}
 noteOff(p){
  const t=this.ctx.currentTime;
  this.active=false;
  this.releaseTime=t+p.release*4;
  release(this.vca.gain,p.release,t);
  release(this.fEnv.offset,p.release,t);
}
 panic(){const t=this.ctx.currentTime;this.active=false;this.releaseTime=0;[this.vca.gain,this.ampTrim.gain,this.gSaw.gain,this.gPulse.gain,this.gSub.gain,this.gNoise.gain,this.fEnv.offset].forEach(param=>{param.cancelScheduledValues(t);param.setValueAtTime(0,t)})}
 update(p){
  const t=this.ctx.currentTime;
  this.hpf.frequency.setValueAtTime(p.hpf,t);
  this.flt.Q.setValueAtTime(p.resonance,t);
  this.fBase.offset.setValueAtTime(clamp(p.cutoff+p._lfoNow*p.filterLfo*3200,30,18000),t);
  this.fEnvAmt.gain.setValueAtTime(p.filterEnv*7000,t);

  // Important: do not zero oscillator mixer gains just because the voice is
  // released. The VCA envelope needs signal to fade during the release tail.
  // Mixer gains are changed on note-on, live while held, and by Panic only.
  if(this.active){
    this.ampTrim.gain.setValueAtTime(p.vca,t);
    this.oSaw.detune.setValueAtTime(-p.detune*.35+p._lfoNow*p.lfoPitch*70,t);
    this.oPulse.detune.setValueAtTime(p.detune*.35+p._lfoNow*p.lfoPitch*70,t);
    this.gSaw.gain.setValueAtTime(p.saw?.34:0,t);
    this.gPulse.gain.setValueAtTime(p.pulse?.34:0,t);
    this.gSub.gain.setValueAtTime(p.sub?p.subLevel*.55:0,t);
    this.gNoise.gain.setValueAtTime(p.noise?p.noiseLevel*.33:0,t);
    this.pwm.curve=pulseCurve(clamp(p.pw+p._pwmNow,0.05,.95));
  }
}
}
class Synth{
